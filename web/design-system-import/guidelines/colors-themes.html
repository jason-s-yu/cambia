<!-- @dsCard group="Colors" viewport="700x190" name="Dark / light themes" subtitle="Dark default; data-theme=light swaps semantic aliases" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px 20px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .lbl { font-size: 11px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-tertiary); font-weight: 700; }
  .mono { font-family: var(--font-mono); }

</style>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
  <div style="background:var(--surface-page);border:1.5px solid var(--border-default);border-radius:14px;padding:14px;">
    <div class="lbl">Night forest (default)</div>
    <div style="background:var(--surface-card);border:1.5px solid var(--border-default);border-radius:10px;padding:10px 12px;margin-top:8px;">
      <div style="font-weight:700;">H2H Rapid</div>
      <div style="font-size:12px;color:var(--text-secondary);">8 rounds · <span class="mono">1520 ± 140</span></div>
    </div>
  </div>
  <div data-theme="light" style="background:var(--surface-page);border:1.5px solid var(--border-default);border-radius:14px;padding:14px;color:var(--text-primary);">
    <div class="lbl" style="color:var(--text-tertiary);">Daylight parchment</div>
    <div style="background:var(--surface-card);border:1.5px solid var(--border-default);border-radius:10px;padding:10px 12px;margin-top:8px;">
      <div style="font-weight:700;">H2H Rapid</div>
      <div style="font-size:12px;color:var(--text-secondary);">8 rounds · <span class="mono">1520 ± 140</span></div>
    </div>
  </div>
</div>
