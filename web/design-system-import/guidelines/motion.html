<!-- @dsCard group="Brand" viewport="700x140" name="Motion" subtitle="Quick ease-out; bounce only for card deals & snaps" -->
<link rel="stylesheet" href="../styles.css">
<style>
  body { padding: 16px 20px; }
  .row { display: flex; gap: 12px; align-items: center; }
  .lbl { font-size: 11px; letter-spacing: 0.09em; text-transform: uppercase; color: var(--text-tertiary); font-weight: 700; }
  .mono { font-family: var(--font-mono); }

@keyframes demo-snap { 0%{transform:translateX(0) rotate(0)} 60%{transform:translateX(210px) rotate(6deg)} 100%{transform:translateX(200px) rotate(0)} }
.snapcard { animation: demo-snap 1.6s var(--ease-snap) infinite alternate; }

</style>
<div style="position:relative;height:70px;">
  <div class="snapcard" style="position:absolute;width:44px;height:62px;background:var(--card-face);border-radius:9px;border:1.5px solid var(--card-face-edge);box-shadow:var(--shadow-playing-card);display:flex;align-items:center;justify-content:center;color:var(--berry-500);font-weight:700;">7♥</div>
  <div style="position:absolute;left:290px;top:10px;font-size:12px;color:var(--text-secondary);max-width:360px;">--ease-snap (springy) for deals/snaps only.<br>--ease-out 120–220ms for all UI transitions.</div>
</div>
