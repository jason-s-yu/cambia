<!-- @startingPoint section="Screens" subtitle="Admin CFR training dashboard" viewport="1360x850" -->
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Cambia — training dashboard kit</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
// Panel is defined in the platform kit; re-declare a minimal local copy so this kit stands alone.
function Panel({ title, action, children, style }) {
  return (
    <section style={{ background: 'var(--surface-card)', border: '1.5px solid var(--border-default)', borderRadius: 'var(--radius-lg)', boxShadow: 'var(--shadow-card)', padding: '16px 18px', ...style }}>
      {(title || action) && (
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <h3 style={{ margin: 0, fontSize: 'var(--text-2xs)', fontWeight: 800, letterSpacing: 'var(--tracking-caps)', textTransform: 'uppercase', color: 'var(--text-tertiary)' }}>{title}</h3>
          {action}
        </div>
      )}
      {children}
    </section>
  );
}
window.Panel = Panel;
</script>
<script type="text/babel" src="./TrainingApp.jsx"></script>
<script type="text/babel">
ReactDOM.createRoot(document.getElementById('root')).render(<window.TrainingApp />);
</script>
</head>
<body>
<div id="root"></div>
</body>
</html>
