# cfr/config/harness/x5-meanimp-eval.yaml
#
# Post-run mean_imp(5) floor evaluation of the X5 full run, as a harness
# evaluate job on nash (Phase 3 Sprint 1, P3W2/P3W7; see
# .docs/v0.4/phase3-full-run/sprint-1-plan.md, "Pinned interfaces"). Submit
# with: cambia harness submit cfr/config/harness/x5-meanimp-eval.yaml
# after the X5 full run (x5-full-train.yaml) completes and frees nash's
# single FIFO slot. mean_imp(5) is an informational per-baseline floor table
# in the X5 verdict (prtcfr_x5_verdict.py); the binding gates are G2 (per
# baseline not_a_loss) computed from these rows, G3-ordering, and G3-trend.
#
# Scheduling: the run and both evals serialize on nash's single FIFO slot.
# Ordering is X5 run -> mean_imp eval (this file) -> exploitability eval
# (x5-exploitability-eval.yaml, or its local-script fallback per P3W2).
# Never concurrent train+eval on one slot; a multi-day X5 run holds the slot
# for its whole window and both evals wait behind it.

# Evaluate job. The runner resolves kind: evaluate to `cambia evaluate`.
kind: evaluate

# Eval job name (this job's id), distinct from the run it evaluates.
name: v0.4-x5-meanimp-eval

# RUN-DIR MODE ONLY. `target` is the X5 run NAME, never a .pt checkpoint
# file: a file target does not error, it silently falls back to
# agent_type=deep_cfr, misses the run's snapshots/ directory, and emits
# plausible but WRONG numbers. Run-dir mode auto-detects algorithm
# (prt-cfr), agent type (the PRTCFRAgentWrapper SD-CFR snapshot mixture),
# and checkpoint prefix from the run's own config.yaml, and scores the
# deployable snapshot mixture.
#
# v0.4-x5-full is the placeholder X5 run name. It MUST equal the `name` set
# in x5-full-train.yaml (P3W1) and the name used at the P3W6 submit; the
# two specs stay in sync on this string at submit time, same as the X4
# pilot/eval pair.
target: v0.4-x5-full

# Games per baseline. mean_imp(5) scores 5 baselines. Run-dir mode already
# defaults to 5000; pinned here explicitly.
games: 5000

# Compute device. Placeholder cpu; V5 (cambia-337) rules the final device.
# If the eval runs on xpu, V4 cross-device tolerance (cambia-336) must be
# ratified before the numbers are gate-authoritative; until then they are
# flagged provisional in the X5 verdict.
device: cpu

priority: normal
force: false

# No `config`: run-dir mode reads the target run's own config.yaml. No
# `resume` (train-only). No `warm_start`. No `target` on the train spec, no
# `config`/`resume` here: the two specs stay in their own field scopes.
