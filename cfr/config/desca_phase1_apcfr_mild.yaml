run_name: desca-phase1-apcfr-mild

persistence:
  agent_data_save_path: "runs/desca-phase1-apcfr-mild/checkpoints/desca_checkpoint.pt"

desca:
  inner_update: apcfr_plus
  apcfr_asymmetry: 0.5
