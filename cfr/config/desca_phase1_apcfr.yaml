run_name: desca-phase1-apcfr-strong

persistence:
  agent_data_save_path: "runs/desca-phase1-apcfr-strong/checkpoints/desca_checkpoint.pt"

desca:
  inner_update: apcfr_plus
  apcfr_asymmetry: 0.9
