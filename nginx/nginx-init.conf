# Temporary HTTP-only config for initial certbot certificate issuance.
# After cert is obtained, switch to nginx.conf (which has SSL).
server {
    listen 80;
    server_name ${STAGING_DOMAIN};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'Cambia staging — waiting for TLS setup';
        add_header Content-Type text/plain;
    }
}
