# HTTP-only config for local dev/benchmarking (no TLS).
server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location /user/     { proxy_pass http://service:8080; proxy_set_header Host $host; }
    location /lobby/    { proxy_pass http://service:8080; proxy_set_header Host $host; }
    location /friends/  { proxy_pass http://service:8080; proxy_set_header Host $host; }
    location /matchmaking/ { proxy_pass http://service:8080; proxy_set_header Host $host; }

    location /ws/ {
        proxy_pass http://service:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
